<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PROTON NEWS // CRT TERMINAL v1.0</title>
  <link rel="stylesheet" href="https://unpkg.com/terminal.css@0.7.4/dist/terminal.min.css" />
  <style>
    :root {
      --bg: #050505;
      --fg: #33ff33;
      --dim: #1a8a1a;
      --hi:  #aaffaa;
    }
    .theme-amber {
      --bg: #1a1000;
      --fg: #ffb000;
      --dim: #8a6000;
      --hi:  #ffdc7a;
    }
    .theme-blue {
      --bg: #00051a;
      --fg: #00aaff;
      --dim: #004a8a;
      --hi:  #aaddff;
    }
    html, body {
      background: var(--bg) !important;
      color: var(--fg) !important;
      font-family: "Courier New", ui-monospace, monospace;
      min-height: 100vh;
      margin: 0;
      transition: background 0.3s, color 0.3s;
    }
    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 1rem;
      padding-bottom: 4rem;
    }
    body {
      text-shadow: 0 0 4px var(--fg);
    }
    @keyframes flicker {
      0% { opacity: 0.97; }
      5% { opacity: 0.95; }
      10% { opacity: 0.9; }
      15% { opacity: 0.95; }
      20% { opacity: 0.98; }
      100% { opacity: 1; }
    }
    body::after {
      content: " ";
      display: block;
      position: fixed;
      top: 0; left: 0; bottom: 0; right: 0;
      background: rgba(18, 16, 16, 0.1);
      opacity: 0;
      z-index: 10000;
      pointer-events: none;
      animation: flicker 0.15s infinite;
    }
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 9999;
      background: repeating-linear-gradient(
        to bottom,
        rgba(0, 0, 0, 0)    0px,
        rgba(0, 0, 0, 0)    2px,
        rgba(0, 0, 0, 0.28) 3px,
        rgba(0, 0, 0, 0.28) 4px
      );
    }
    h1, h2, h3, p, label, span, div, button, small {
      color: var(--fg) !important;
    }
    a {
      color: var(--fg) !important;
      text-decoration: underline;
    }
    a:hover {
      background: var(--fg);
      color: var(--bg) !important;
    }
    fieldset {
      border: 1px solid var(--fg) !important;
      background: rgba(0, 40, 0, 0.1) !important;
      margin-bottom: 1rem;
      padding: 1rem 1.25rem;
    }
    legend {
      color: var(--fg) !important;
      text-transform: uppercase;
      letter-spacing: 2px;
      padding: 0 0.5rem;
    }
    .prompt { color: var(--fg); }
    
    #footer {
      text-align: center;
      margin-top: 3rem;
      padding: 1rem 0;
      font-size: 0.8rem;
      color: var(--dim) !important;
      letter-spacing: 1px;
    }
    #footer a {
      color: var(--fg) !important;
      text-decoration: none;
      border-bottom: 1px dotted var(--fg);
    }
    #footer a:hover {
      background: var(--fg);
      color: var(--bg) !important;
    }


    /* ===== TOP NAV ===== */
    #topnav {
      position: sticky;
      top: 0;
      z-index: 100;
      display: flex;
      gap: 0.5rem;
      padding: 0.6rem 0.5rem;
      margin: 0 0 1rem 0;
      background: rgba(0, 20, 0, 0.92);
      border-bottom: 1px solid #33ff33;
    }
    #topnav button {
      background: transparent;
      color: var(--fg) !important;
      border: 1px solid var(--fg);
      padding: 0.35rem 0.9rem;
      font-family: inherit;
      font-size: 0.95rem;
      letter-spacing: 2px;
      cursor: pointer;
      text-transform: uppercase;
    }
    #topnav button:hover {
      background: rgba(0, 255, 0, 0.1);
    }
    #topnav button.active {
      background: var(--fg);
      color: var(--bg) !important;
      text-shadow: none;
    }
    #topnav .badge {
      margin-left: auto;
      align-self: center;
      color: var(--dim) !important;
      font-size: 0.8rem;
      letter-spacing: 1px;
    }
    #marquee-wrap {
      background: var(--dim);
      color: var(--bg) !important;
      overflow: hidden;
      white-space: nowrap;
      padding: 2px 0;
      font-size: 0.85rem;
      font-weight: bold;
      border-bottom: 1px solid var(--fg);
    }
    #marquee-text {
      display: inline-block;
      padding-left: 100%;
      animation: marquee 30s linear infinite;
    }
    @keyframes marquee {
      0% { transform: translate(0, 0); }
      100% { transform: translate(-100%, 0); }
    }
    #cli-wrap {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: rgba(0, 0, 0, 0.95);
      border-top: 1px solid var(--fg);
      padding: 0.5rem;
      z-index: 1000;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    #cli-input {
      flex: 1;
      background: transparent;
      border: none;
      color: var(--fg);
      font-family: inherit;
      font-size: 1rem;
      outline: none;
    }


    /* ===== SECTIONS ===== */
    .section { display: none; }
    .section.active { display: block; }

    #news-container { margin-top: 1.25rem; }
    .story-title { margin: 0 0 0.5rem 0; }
    .story-link  { display: inline-block; margin-top: 0.5rem; }
    .story-meta  { color: #1a8a1a !important; font-size: 0.8rem; margin: 0 0 0.4rem 0; }

    /* ===== STOCKS ===== */
    #stock-search-wrap {
      margin: 0.5rem 0 1.5rem 0;
      border: 1px dashed var(--dim);
      padding: 1rem;
      background: rgba(0, 20, 0, 0.4);
    }
    #stock-query {
      flex: 1;
      background: var(--bg);
      color: var(--fg);
      border: 1px solid var(--fg);
      padding: 0.4rem 0.6rem;
      font-family: inherit;
      font-size: 0.95rem;
    }
    #btn-stock-search {
      background: transparent;
      color: var(--fg) !important;
      border: 1px solid var(--fg);
      padding: 0.4rem 1.2rem;
      font-family: inherit;
      cursor: pointer;
      text-transform: uppercase;
    }
    #btn-stock-search:hover {
      background: rgba(0, 255, 0, 0.1);
    }
    #stock-search-results {
      margin-top: 0.75rem;
      max-height: 220px;
      overflow-y: auto;
      border-top: 1px dashed var(--dim);
      padding-top: 0.5rem;
    }
    .search-result-item {
      background: transparent;
      border: 1px solid var(--dim);
      color: var(--fg) !important;
      padding: 0.4rem 0.6rem;
      margin: 0.25rem 0;
      width: 100%;
      text-align: left;
      font-family: inherit;
      font-size: 0.85rem;
      cursor: pointer;
      display: block;
    }
    .search-result-item:hover {
      background: rgba(0, 255, 0, 0.1);
      border-color: var(--fg);
    }
    #watchlist-wrap {
      margin-bottom: 1.5rem;
      border: 1px solid var(--dim);
      padding: 0.5rem;
      background: rgba(0, 0, 0, 0.5);
    }
    #watchlist-row {
      display: flex;
      flex-wrap: wrap;
      gap: 0.3rem;
    }
    #watchlist-row button {
      background: transparent;
      color: var(--fg) !important;
      border: 1px solid var(--dim);
      font-size: 0.8rem;
      cursor: pointer;
      padding: 0.2rem 0.5rem;
    }
    #watchlist-row button:hover {
      border-color: var(--fg);
    }
    #ticker-row {
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
      margin: 0.75rem 0 1.25rem 0;
    }
    #ticker-row button {
      background: transparent;
      color: var(--fg) !important;
      border: 1px solid var(--fg);
      padding: 0.3rem 0.7rem;
      font-family: inherit;
      font-size: 0.9rem;
      letter-spacing: 1px;
      cursor: pointer;
    }
    #ticker-row button:hover { background: rgba(0, 255, 0, 0.1); }
    #ticker-row button.active {
      background: var(--fg);
      color: var(--bg) !important;
      text-shadow: none;
    }
    #range-row button {
      background: transparent;
      color: var(--dim) !important;
      border: 1px solid var(--dim);
      padding: 0.2rem 0.5rem;
      font-family: inherit;
      font-size: 0.8rem;
      cursor: pointer;
    }
    #range-row button:hover {
      color: var(--fg) !important;
      border-color: var(--fg);
    }
    #range-row button.active {
      background: var(--fg);
      color: var(--bg) !important;
      border-color: var(--fg);
      text-shadow: none;
    }
    #stock-chart-wrap {
      border: 1px solid var(--fg);
      background: rgba(0, 40, 0, 0.1);
      padding: 0.75rem;
      margin-bottom: 1rem;
    }
    #stock-chart-wrap canvas { height: 360px !important; width: 100% !important; }
    #stock-stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 0.5rem;
    }
    #stock-stats .stat {
      border: 1px solid var(--dim);
      padding: 0.6rem 0.8rem;
      background: rgba(0, 0, 0, 0.4);
    }
    #stock-stats .stat .k { color: var(--dim) !important; font-size: 0.75rem; letter-spacing: 1px; text-transform: uppercase; }
    #stock-stats .stat .v { color: var(--fg) !important; font-size: 1.15rem; margin-top: 0.2rem; }
    #stock-stats .stat .v.pos { color: var(--fg) !important; }
    #stock-stats .stat .v.neg { color: #ff5555 !important; }
    #stock-head {
      display: flex;
      align-items: baseline;
      gap: 0.75rem;
      flex-wrap: wrap;
      margin-bottom: 0.5rem;
    }
    #stock-head .name  { color: var(--dim) !important; font-size: 0.85rem; letter-spacing: 1px; }
    #stock-head .last  { color: var(--fg) !important; font-size: 2rem; }
    #stock-head .chg   { font-size: 1rem; }
    #stock-head .chg.pos { color: var(--fg) !important; }
    #stock-head .chg.neg { color: #ff5555 !important; }


    /* ===== GLOBE ===== */
    #globe-layout {
      display: grid;
      grid-template-columns: minmax(0, 2fr) minmax(280px, 1fr);
      gap: 1rem;
    }
    @media (max-width: 800px) {
      #globe-layout { grid-template-columns: 1fr; }
    }
    #worldmap-wrap {
      border: 1px solid var(--fg);
      background: rgba(0, 40, 0, 0.1);
      padding: 0.5rem;
    }
    #worldmap { width: 100%; height: auto; display: block; }
    #worldmap path {
      fill: var(--bg);
      stroke: var(--fg);
      stroke-width: 0.4;
      cursor: pointer;
      transition: fill 0.1s;
    }
    #worldmap path.has-feed  { fill: var(--dim); }
    #worldmap path:hover     { fill: var(--fg); }
    #worldmap path.selected  { fill: var(--hi); }
    #country-news {
      max-height: 75vh;
      overflow-y: auto;
      padding-right: 0.5rem;
    }
    #country-news .empty { color: var(--dim) !important; font-style: italic; }
    #country-weather {
      margin-bottom: 1rem;
      padding: 0.5rem;
      border: 1px solid var(--dim);
      font-size: 0.85rem;
      background: rgba(0, 0, 0, 0.3);
    }
    #news-filter-wrap {
      margin-bottom: 1rem;
      display: flex;
      gap: 0.5rem;
      align-items: center;
    }
    #news-filter {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--fg);
      color: var(--fg);
      padding: 0.3rem 0.5rem;
      font-family: inherit;
    }

  </style>
</head>
<body class="terminal">
  <div class="container">
    <h1>&gt; PROTON-NEWS_v1.0</h1>
    <p class="prompt">$ ./fetch_headlines --live --source=127.0.0.1:8000</p>

    <nav id="topnav">
      <button data-section="news"   class="active">[ NEWS   ]</button>
      <button data-section="stocks">      [ STOCKS ]</button>
      <button data-section="globe">       [ GLOBE  ]</button>
      <div id="world-clocks" style="margin-left: auto; display:flex; gap:1rem; font-size:0.7rem; color:var(--dim);"></div>
      <button id="btn-theme" style="margin-left:1rem;">[ THEME ]</button>
      <span class="badge" id="topnav-badge"></span>
    </nav>
    <div id="marquee-wrap">
      <div id="marquee-text">Initializing data stream...</div>
    </div>

    <!-- ============= NEWS ============= -->
    <section id="sec-news" class="section active">
      <div id="news-filter-wrap">
        <span class="prompt">$ filter:</span>
        <input type="text" id="news-filter" placeholder="enter keyword to filter stream..." />
      </div>
      <p id="status">loading...</p>
      <hr />
      <div id="news-container"></div>
    </section>

    <!-- ============= STOCKS ============= -->
    <section id="sec-stocks" class="section">
      <div id="watchlist-wrap">
        <div style="font-size:0.7rem; color:var(--dim); margin-bottom:0.3rem;">[ PINNED ASSETS ]</div>
        <div id="watchlist-row"></div>
      </div>
      <!-- STOCK SEARCH MODULE -->
      <div id="stock-search-wrap">
        <label for="stock-query" style="display:block; margin-bottom:0.5rem; font-weight:bold;">[ SEARCH DIRECTORY: STOCKS / COMMODITIES / BONDS / CRYPTO ]</label>
        <div style="display:flex; gap:0.5rem;">
          <input type="text" id="stock-query" placeholder="e.g. AAPL, Gold, Crude Oil, 10-year, BTC-USD..." />
          <button id="btn-stock-search">[ SEARCH ]</button>
        </div>
        <div id="stock-search-results" style="display:none;"></div>
      </div>
      <p id="stock-status">loading ticker list...</p>
      <div style="display: flex; justify-content: space-between; align-items: baseline; flex-wrap: wrap; margin-top: 1rem;">
        <label style="font-weight:bold;">[ TICKER INDEX ]</label>
        <div id="range-row" style="display:flex; gap:0.3rem;">
          <button data-range="1d">[ 1D ]</button>
          <button data-range="5d">[ 5D ]</button>
          <button data-range="1mo">[ 1M ]</button>
          <button data-range="3mo">[ 3M ]</button>
          <button data-range="1y" class="active">[ 1Y ]</button>
          <button data-range="max">[ ALL ]</button>
        </div>
      </div>
      <div id="ticker-row"></div>
      <div id="stock-head" style="display:none">
        <span class="name" id="stock-name"></span>
        <span class="last" id="stock-last"></span>
        <span class="chg"  id="stock-chg"></span>
        <button id="btn-pin-stock" style="margin-left:auto; font-size:0.7rem;">[ PIN ]</button>
      </div>
      <div id="stock-chart-wrap">
        <canvas id="stock-chart"></canvas>
      </div>
      <div id="stock-stats"></div>
    </section>

    <!-- ============= GLOBE ============= -->
    <section id="sec-globe" class="section">
      <p id="globe-status">loading map...</p>
      <div id="globe-layout">
        <div id="worldmap-wrap">
          <svg id="worldmap" viewBox="0 0 800 500" preserveAspectRatio="xMidYMid meet"></svg>
        </div>
        <div id="country-news">
          <div id="country-weather"></div>
          <p class="empty">click a country on the map to see its news.</p>
        </div>
      </div>
    </section>
    <div id="cli-wrap">
      <span class="prompt">$</span>
      <input type="text" id="cli-input" placeholder="enter command (goto news | search symbol | theme | clear)..." />
    </div>
    <div id="footer">made with ❤️ by <a href="https://github.com/protonexe">proton</a></div>
  </div>


  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
  <script src="https://cdn.jsdelivr.net/npm/topojson-client@3"></script>
  <script>
    "use strict";

    const API_URL  = "/news";
    const TICKERS  = ["AAPL", "MSFT", "GOOGL", "AMZN", "TSLA", "NVDA", "META", "^GSPC", "^DJI", "^IXIC"];

    // ============= STATE =============
    let allStories     = [];
    let stockChart     = null;
    let mapLoaded      = false;
    let currentSymbol  = "AAPL";
    let currentRange   = "1y";
    let watchlist      = JSON.parse(localStorage.getItem("proton_watchlist") || '["AAPL", "BTC-USD", "^GSPC"]');
    let currentTheme   = localStorage.getItem("proton_theme") || "green";

    // ============= THEME =============
    function applyTheme(theme) {
      document.body.classList.remove("theme-amber", "theme-blue");
      if (theme === "amber") document.body.classList.add("theme-amber");
      if (theme === "blue") document.body.classList.add("theme-blue");
      localStorage.setItem("proton_theme", theme);
      currentTheme = theme;
    }

    // ============= WORLD CLOCKS =============
    function updateClocks() {
      const clocks = document.getElementById("world-clocks");
      const cities = [
        { name: "NYC", tz: "America/New_York" },
        { name: "LDN", tz: "Europe/London" },
        { name: "TKY", tz: "Asia/Tokyo" },
        { name: "HKG", tz: "Asia/Hong_Kong" },
      ];
      clocks.innerHTML = cities.map(c => {
        const time = new Date().toLocaleTimeString("en-GB", { timeZone: c.tz, hour12: false, hour: "2-digit", minute: "2-digit" });
        return `<span>${c.name}: ${time}</span>`;
      }).join("");
    }

    // ============= MARQUEE =============
    function updateMarquee() {
      const marquee = document.getElementById("marquee-text");
      if (allStories.length) {
        const topStories = allStories.slice(0, 5).map(s => s.title).join("  //  ");
        marquee.textContent = `>>> LATEST BROADCAST: ${topStories}  <<<`;
      }
    }

    // ============= CLI =============
    function setupCLI() {
      const input = document.getElementById("cli-input");
      input.addEventListener("keydown", e => {
        if (e.key === "Enter") {
          const cmd = input.value.toLowerCase().trim();
          input.value = "";
          
          if (cmd === "clear") {
            document.getElementById("news-container").innerHTML = "";
          } else if (cmd.startsWith("goto ")) {
            const sec = cmd.split(" ")[1];
            const btn = document.querySelector(`#topnav button[data-section="${sec}"]`);
            if (btn) btn.click();
          } else if (cmd.startsWith("search ")) {
            const sym = cmd.split(" ")[1].toUpperCase();
            currentSymbol = sym;
            loadStock(sym, currentRange);
            setSection("stocks");
          } else if (cmd === "theme") {
            const themes = ["green", "amber", "blue"];
            const next = themes[(themes.indexOf(currentTheme) + 1) % themes.length];
            applyTheme(next);
          } else {
            alert("Unknown command. Try: goto news | search AAPL | theme | clear");
          }
        }
      });
    }

    // ============= NAV =============

    function setSection(name) {
      document.querySelectorAll("#topnav button").forEach(b => {
        b.classList.toggle("active", b.dataset.section === name);
      });
      document.querySelectorAll(".section").forEach(s => {
        s.classList.toggle("active", s.id === "sec-" + name);
      });
      if (name === "stocks") {
        initStocks();
      } else if (name === "globe") {
        initGlobe();
      }
    }
    document.querySelectorAll("#topnav button").forEach(b => {
      b.addEventListener("click", () => setSection(b.dataset.section));
    });

    // ============= UTIL =============
    function pad2(n) { return String(n).padStart(2, "0"); }
    function fmtNum(n, d = 2) {
      if (n === null || n === undefined || Number.isNaN(n)) return "—";
      return Number(n).toLocaleString(undefined, { minimumFractionDigits: d, maximumFractionDigits: d });
    }
    function fmtPct(n) {
      if (n === null || n === undefined || Number.isNaN(n)) return "—";
      const s = (n >= 0 ? "+" : "") + Number(n).toFixed(2) + "%";
      return s;
    }
    function fmtVol(n) {
      if (n === null || n === undefined) return "—";
      return Math.round(Number(n)).toLocaleString();
    }

    // ============= NEWS =============
    function renderStory(story, index) {
      const fs = document.createElement("fieldset");
      const lg = document.createElement("legend");
      const country = story.country ? "  //  " + story.country : "";
      lg.textContent =
        " [ " + String(story.category || "UNKNOWN").toUpperCase() +
        " ] // entry " + pad2(index + 1) + country;
      fs.appendChild(lg);

      const h = document.createElement("h3");
      h.className = "story-title";
      h.textContent = story.title || "Untitled";
      fs.appendChild(h);

      const p = document.createElement("p");
      p.textContent = story.summary || "[No summary available]";
      fs.appendChild(p);

      const a = document.createElement("a");
      a.href = story.link || "#";
      a.target = "_blank";
      a.rel = "noopener noreferrer";
      a.className = "story-link";
      a.textContent = ">> open source";
      fs.appendChild(a);

      return fs;
    }

    async function loadNews() {
      const status = document.getElementById("status");
      const container = document.getElementById("news-container");
      const badge = document.getElementById("topnav-badge");
      const filter = document.getElementById("news-filter").value.toLowerCase();

      try {
        const fastRes = await fetch(`${API_URL}?limit=10`);
        if (!fastRes.ok) throw new Error("HTTP " + fastRes.status);
        const initialStories = await fastRes.json();
        
        container.innerHTML = "";
        initialStories.forEach((story, i) => container.appendChild(renderStory(story, i)));
        status.textContent = "[" + new Date().toLocaleTimeString() + "] partial signal received... loading full stream";

        const fullRes = await fetch(API_URL);
        if (!fullRes.ok) throw new Error("HTTP " + fullRes.status);
        const stories = await fullRes.json();
        allStories = stories;

        status.textContent =
          "[" + new Date().toLocaleTimeString() + "] signal fully decoded :: " +
          stories.length + " headline(s) online.";
        
        container.innerHTML = "";
        const filtered = stories.filter(s => 
          s.title.toLowerCase().includes(filter) || 
          s.summary.toLowerCase().includes(filter)
        );

        filtered.forEach((story, i) => container.appendChild(renderStory(story, i)));
        
        updateMarquee();
        const cset = new Set(stories.map(s => s.country).filter(Boolean));
        badge.textContent = cset.size + " country nodes online";
        if (mapLoaded) {
          highlightMapCountries(cset);
        }
      } catch (err) {
        status.textContent =
          "[ERROR] could not reach backend at " + API_URL + " :: " + err.message;
      }
    }

    document.getElementById("news-filter").addEventListener("input", loadNews);


    // ============= STOCKS =============
    function buildTickerRow() {
      const row = document.getElementById("ticker-row");
      if (row.children.length) return;
      TICKERS.forEach(sym => {
        const b = document.createElement("button");
        b.textContent = sym;
        b.dataset.sym = sym;
        b.addEventListener("click", () => {
          row.querySelectorAll("button").forEach(x => x.classList.toggle("active", x === b));
          currentSymbol = sym;
          loadStock(sym, currentRange);
        });
        row.appendChild(b);
      });
    }

    function updateWatchlist() {
      const row = document.getElementById("watchlist-row");
      row.innerHTML = "";
      watchlist.forEach(sym => {
        const b = document.createElement("button");
        b.textContent = sym;
        b.addEventListener("click", () => {
          currentSymbol = sym;
          loadStock(sym, currentRange);
          setSection("stocks");
        });
        row.appendChild(b);
      });
    }

    function renderStockStats(s) {
      const stats = document.getElementById("stock-stats");
      const chgCls = s.change >= 0 ? "pos" : "neg";
      const cells = [
        ["Symbol",         s.symbol],
        ["Currency",       s.currency || "—"],
        ["Exchange",       s.exchange || "—"],
        ["Previous Close", fmtNum(s.previousClose)],
        ["Day Open",       fmtNum(s.dayOpen)],
        ["Day High",       fmtNum(s.dayHigh)],
        ["Day Low",        fmtNum(s.dayLow)],
        ["Volume",         fmtVol(s.volume)],
        ["52-Week High",   fmtNum(s.fiftyTwoHigh)],
        ["52-Week Low",    fmtNum(s.fiftyTwoLow)],
        ["P/E Ratio",      s.metrics?.pe || "—"],
        ["Market Cap",     s.metrics?.marketCap || "—"],
        ["Div Yield",      s.metrics?.dividend || "—"],
      ];
      stats.innerHTML = "";
      cells.forEach(([k, v]) => {
        const div = document.createElement("div");
        div.className = "stat";
        const kk = document.createElement("div"); kk.className = "k"; kk.textContent = k;
        const vv = document.createElement("div"); vv.className = "v"; vv.textContent = v;
        div.appendChild(kk); div.appendChild(vv);
        stats.appendChild(div);
      });
      const changeCell = document.createElement("div");
      changeCell.className = "stat";
      const k1 = document.createElement("div"); k1.className = "k"; k1.textContent = "Change";
      const v1 = document.createElement("div"); v1.className = "v " + chgCls;
      v1.textContent = fmtNum(s.change) + "  (" + fmtPct(s.changePct) + ")";
      changeCell.appendChild(k1); changeCell.appendChild(v1);
      stats.appendChild(changeCell);
    }


    function renderStockChart(s) {
      const labels = s.history.map(p => p.date);
      const closes = s.history.map(p => p.close);
      const canvas = document.getElementById("stock-chart");
      const ctx = canvas.getContext("2d");

      if (stockChart) {
        stockChart.data.labels = labels;
        stockChart.data.datasets[0].label = s.symbol + " close (" + currentRange.toUpperCase() + ")";
        stockChart.data.datasets[0].data = closes;
        stockChart.update("none");
        return;
      }
      stockChart = new Chart(ctx, {
        type: "line",
        data: {
          labels: labels,
          datasets: [{
            label: s.symbol + " close (" + currentRange.toUpperCase() + ")",
            data: closes,
            borderColor: "#33ff33",
            backgroundColor: "rgba(51, 255, 51, 0.12)",
            borderWidth: 1.5,
            pointRadius: 0,
            tension: 0.1,
            fill: true,
          }],
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          animation: false,
          events: [],
          plugins: {
            legend: { display: false },
            tooltip: { enabled: false },
          },
          scales: {
            x: {
              ticks: { 
                color: "#33ff33", 
                autoSkip: true, 
                maxTicksLimit: 10,
                font: { family: "Courier New" },
                maxRotation: 0,
                minRotation: 0
              },
              grid:  { color: "rgba(51, 255, 51, 0.10)" },
            },
            y: {
              type: 'linear',
              display: true,
              position: 'left',
              beginAtZero: false,
              ticks: { color: "#33ff33", font: { family: "Courier New" } },
              grid:  { color: "rgba(51, 255, 51, 0.10)" },
            },
          },
        },
      });
    }

    function renderStockHead(s) {
      const head = document.getElementById("stock-head");
      head.style.display = "flex";
      document.getElementById("stock-name").textContent = s.name + "  (" + s.symbol + ")";
      document.getElementById("stock-last").textContent = fmtNum(s.last);
      const chg = document.getElementById("stock-chg");
      chg.textContent = (s.change >= 0 ? "▲ " : "▼ ") + fmtNum(Math.abs(s.change)) +
                        "  (" + fmtPct(s.changePct) + ")";
      chg.className = "chg " + (s.change >= 0 ? "pos" : "neg");
    }

    async function loadStock(sym, range = "1y") {
      const status = document.getElementById("stock-status");
      status.textContent = "fetching " + sym + " (" + range.toUpperCase() + ") from yahoo...";
      try {
        const url = `/stocks/${encodeURIComponent(sym)}?range=${encodeURIComponent(range)}`;
        const res = await fetch(url);
        if (!res.ok) throw new Error("HTTP " + res.status + " " + (await res.text()));
        const s = await res.json();
        renderStockHead(s);
        renderStockChart(s);
        renderStockStats(s);
        status.textContent = "[" + new Date().toLocaleTimeString() + "] " + sym + " (" + range.toUpperCase() + ") decoded.";
      } catch (err) {
        status.textContent = "[ERROR] " + sym + " :: " + err.message;
      }
    }

    function setupSearch() {
      const qInput  = document.getElementById("stock-query");
      const sButton = document.getElementById("btn-stock-search");
      const rBox    = document.getElementById("stock-search-results");

      async function executeSearch() {
        const query = qInput.value.trim();
        if (!query) return;
        rBox.style.display = "block";
        rBox.innerHTML = "<p class='prompt'>searching database directory...</p>";
        try {
          const res = await fetch(`/stocks/search?q=${encodeURIComponent(query)}`);
          if (!res.ok) throw new Error("HTTP " + res.status);
          const results = await res.json();
          rBox.innerHTML = "";
          if (!results.length) {
            rBox.innerHTML = "<p class='empty'>no matching symbols found in index.</p>";
            return;
          }
          results.forEach(item => {
            const btn = document.createElement("button");
            btn.className = "search-result-item";
            btn.textContent = `[${item.symbol}]  ${item.name}  —  Type: ${item.quoteType} (${item.exchange})`;
            btn.addEventListener("click", () => {
              currentSymbol = item.symbol;
              document.querySelectorAll("#ticker-row button").forEach(b => b.classList.remove("active"));
              loadStock(item.symbol, currentRange);
              rBox.style.display = "none";
              qInput.value = "";
            });
            rBox.appendChild(btn);
          });
        } catch (err) {
          rBox.innerHTML = `<p class='empty'>[SEARCH ERROR] :: ${err.message}</p>`;
        }
      }

      sButton.addEventListener("click", executeSearch);
      qInput.addEventListener("keydown", e => {
        if (e.key === "Enter") executeSearch();
      });
    }

    function setupRangeSelector() {
      document.querySelectorAll("#range-row button").forEach(b => {
        b.addEventListener("click", () => {
          document.querySelectorAll("#range-row button").forEach(x => x.classList.toggle("active", x === b));
          currentRange = b.dataset.range;
          loadStock(currentSymbol, currentRange);
        });
      });
    }

    function initStocks() {
      const status = document.getElementById("stock-status");
      if (status.textContent.startsWith("loading ticker")) {
        status.textContent = "ready.";
      }
      buildTickerRow();
      updateWatchlist();
      setupRangeSelector();
      setupSearch();
      
      document.getElementById("btn-pin-stock").addEventListener("click", () => {
        if (!watchlist.includes(currentSymbol)) {
          watchlist.push(currentSymbol);
          localStorage.setItem("proton_watchlist", JSON.stringify(watchlist));
          updateWatchlist();
        }
      });

      if (!stockChart) {
        loadStock(currentSymbol, currentRange);
      }
    }


    // ============= GLOBE =============
    const TOPOJSON_URL = "https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json";

    function highlightMapCountries(cset) {
      const svg = document.getElementById("worldmap");
      svg.querySelectorAll("path").forEach(p => {
        const n = p.__name;
        p.classList.toggle("has-feed", cset.has(n));
      });
    }

    async function renderCountryNews(countryName) {
      const box = document.getElementById("country-news");
      const weatherBox = document.getElementById("country-weather");
      box.innerHTML = "";
      box.appendChild(weatherBox);
      
      // Fetch Weather
      weatherBox.innerHTML = "<p class='prompt'>fetching meteorological data...</p>";
      try {
        // 1. Geocode country name to coordinates
        const geoRes = await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(countryName)}&count=1&language=en&format=json`);
        if (!geoRes.ok) throw new Error("Geocoding failed");
        const geoData = await geoRes.json();
        
        if (!geoData.results || geoData.results.length === 0) {
          weatherBox.innerHTML = "<p>meteorological data unavailable for this node.</p>";
        } else {
          const { latitude, longitude } = geoData.results[0];
          // 2. Fetch weather using coordinates
          const wRes = await fetch(`/weather?lat=${latitude}&lon=${longitude}`);
          const wData = await wRes.json();
          weatherBox.innerHTML = wData.temperature 
            ? `<p>LOCAL CLIMATE: ${wData.temperature}°C // WIND: ${wData.windspeed}km/h</p>` 
            : `<p>meteorological data unavailable for this node.</p>`;
        }
      } catch (e) {
        weatherBox.innerHTML = "<p>weather uplink failure.</p>";
      }
      
      const stories = allStories.filter(s => s.country === countryName);
      const head = document.createElement("fieldset");
      const lg = document.createElement("legend");
      lg.textContent = " [ " + countryName.toUpperCase() + " ] // " + stories.length + " headline(s)";
      head.appendChild(lg);
      if (!stories.length) {
        const p = document.createElement("p");
        p.className = "empty";
        p.textContent = "no sources from this country.";
        head.appendChild(p);
      } else {
        stories.forEach((s, i) => {
          const h = document.createElement("h3");
          h.style.margin = "0.4rem 0 0.3rem 0";
          h.textContent = s.title;
          head.appendChild(h);
          const m = document.createElement("p");
          m.className = "story-meta";
          m.textContent = s.category + (s.link ? "  //  " + s.link : "");
          head.appendChild(m);
        });
      }
      box.appendChild(head);
    }

      const head = document.createElement("fieldset");
      const lg = document.createElement("legend");
      lg.textContent = " [ " + countryName.toUpperCase() + " ] // " + stories.length + " headline(s)";
      head.appendChild(lg);
      if (!stories.length) {
        const p = document.createElement("p");
        p.className = "empty";
        p.textContent = "no sources from this country.";
        head.appendChild(p);
      } else {
        stories.forEach((s, i) => {
          const h = document.createElement("h3");
          h.style.margin = "0.4rem 0 0.3rem 0";
          h.textContent = s.title;

    function buildMap(topology) {
      const svg = d3.select("#worldmap");
      svg.selectAll("*").remove();
      const geojson = topojson.feature(topology, topology.objects.countries);
      const features = geojson.features;
      const projection = d3.geoNaturalEarth1().fitSize([800, 500], geojson);
      const path = d3.geoPath(projection);
      const cset = new Set(allStories.map(s => s.country).filter(Boolean));
      svg.selectAll("path")
        .data(features)
        .enter()
        .append("path")
        .attr("d", path)
        .attr("__name", d => d.properties.name)
        .each(function(d) { this.__name = d.properties.name; })
        .classed("has-feed", d => cset.has(d.properties.name))
        .on("click", function(event, d) {
          svg.selectAll("path").classed("selected", false);
          d3.select(this).classed("selected", true);
          renderCountryNews(d.properties.name);
        })
        .append("title")
        .text(d => d.properties.name + (cset.has(d.properties.name) ? "  ●" : ""));
      mapLoaded = true;
    }

    async function initGlobe() {
      const status = document.getElementById("globe-status");
      if (mapLoaded) {
        status.textContent = "ready. click any highlighted country.";
        return;
      }
      status.textContent = "fetching world atlas...";
      try {
        const topo = await d3.json(TOPOJSON_URL);
        buildMap(topo);
        status.textContent = "ready. click any highlighted country.";
      } catch (err) {
        status.textContent = "[ERROR] could not load map: " + err.message;
      }
    }

    // ============= BOOT =============
    applyTheme(currentTheme);
    updateClocks();
    setInterval(updateClocks, 1000);
    setupCLI();
    
    document.getElementById("btn-theme").addEventListener("click", () => {
      const themes = ["green", "amber", "blue"];
      const next = themes[(themes.indexOf(currentTheme) + 1) % themes.length];
      applyTheme(next);
    });

    loadNews();
  </script>
